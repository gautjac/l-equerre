name: LEquerre
options:
  bundleIdPrefix: app.atelier
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  developmentLanguage: fr

# FR-first (Québécois). fr is the development/fallback language.
knownRegions:
  - fr
  - en
  - Base

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Sign with the real Apple Development identity (not ad-hoc). A stable
    # signature anchors the code identity across rebuilds, so the Accessibility
    # permission the user grants PERSISTS instead of being dropped each build —
    # ad-hoc ("Sign to Run Locally") changes the cdhash every time and TCC fails
    # to list / keep the grant. Override the team via `xcodebuild ... DEVELOPMENT_TEAM=`.
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 9WZ66DZ69J
    GENERATE_INFOPLIST_FILE: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  LEquerre:
    type: application
    # macOS-only menubar window manager (NSStatusItem + SwiftUI popover).
    supportedDestinations: [macOS]
    deploymentTarget:
      macOS: "14.0"
    sources:
      - path: Sources
    info:
      path: Sources/Resources/Info.plist
      properties:
        CFBundleDisplayName: L'Équerre
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundleLocalizations:
          - fr
          - en
        LSApplicationCategoryType: public.app-category.utilities
        # Menubar agent: no Dock icon, no main window on launch.
        LSUIElement: true
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.atelier.lequerre
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        # Window control needs to drive *other* apps' windows via the
        # Accessibility API, which an App-Sandbox process cannot do. A window
        # manager is inherently non-sandboxed (like Rectangle / Lasso), so we
        # ship without the sandbox and rely on the Accessibility permission
        # the user grants explicitly on first run.
        CODE_SIGN_ENTITLEMENTS: Sources/Resources/LEquerre.entitlements

  LEquerreTests:
    type: bundle.unit-test
    supportedDestinations: [macOS]
    deploymentTarget:
      macOS: "14.0"
    sources:
      - path: Tests
    dependencies:
      - target: LEquerre
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.atelier.lequerre.tests
        GENERATE_INFOPLIST_FILE: YES
        "TEST_HOST[sdk=macosx*]": "$(BUILT_PRODUCTS_DIR)/LEquerre.app/Contents/MacOS/LEquerre"

schemes:
  LEquerre:
    build:
      targets:
        LEquerre: all
        LEquerreTests: [test]
    test:
      targets:
        - LEquerreTests
